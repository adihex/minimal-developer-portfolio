name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3

      - name: Install dependencies
        uses: bahmutov/npm-install@v1

      - name: Build project
        run: npm run build

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./dist

  deploy:
    name: Deploy to adihex.github.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v3
        with:
          repository: adihex/adihex.github.io
          token: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          path: target-repo

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./portfolio-build

      - name: Sync portfolio files to root
        run: |
          cd target-repo
          # Remove old portfolio files (preserve other projects like zettel/)
          rm -rf index.html assets public portfolio 2>/dev/null || true
          
          # Copy new build files to root
          cp -r ../portfolio-build/* ./
          
          # List what we're deploying
          echo "Deploying to root:"
          ls -la

      - name: Commit and push
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Update portfolio from minimal-developer-portfolio"
            git push https://x-access-token:${{ secrets.EXTERNAL_REPO_TOKEN }}@github.com/adihex/adihex.github.io.git
          else
            echo "No changes to deploy"
          fi
