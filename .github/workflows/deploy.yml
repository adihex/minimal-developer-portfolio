name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3

      - name: Install dependencies
        uses: bahmutov/npm-install@v1

      - name: Build project
        run: npm run build

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: ./dist

  deploy:
    name: Deploy to adihex.github.io
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v3
        with:
          repository: adihex/adihex.github.io
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./portfolio-build

      - name: Sync portfolio files
        run: |
          # Remove old portfolio directory if exists
          rm -rf portfolio
          # Move built files to portfolio subdirectory
          mv portfolio-build portfolio
          # Or if you want it at root, use: mv portfolio-build/* ./

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio
          git diff --staged --quiet || git commit -m "Update portfolio from minimal-developer-portfolio"
          git push
