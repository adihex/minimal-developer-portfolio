<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    .bg { fill: none; }
    .text {
      font-family: "Archivo", ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 380px;
      fill: #1d252c; /* graphite ink */
      dominant-baseline: central;
      text-anchor: middle;
    }
    .accent {
      fill: #e0533c; /* vermilion redline */
    }
    @media (prefers-color-scheme: dark) {
      .text {
        fill: #f0f3f6; /* light gray-white ink for dark browser tabs */
      }
    }
  </style>
  <rect class="bg" width="512" height="512" />
  <text class="text" x="256" y="260">A</text>
  <circle class="accent" cx="348" cy="143" r="30" />
</svg>
